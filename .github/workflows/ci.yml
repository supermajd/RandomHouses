name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: ruff check .

      - name: Check formatting with Ruff
        run: ruff format --check .

      - name: Save previous approved metadata
        shell: bash
        run: |
          set -e

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin main
            git show origin/main:models/approved/latest.json > /tmp/previous_latest.json
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git show ${{ github.event.before }}:models/approved/latest.json > /tmp/previous_latest.json
          else
            echo "{}" > /tmp/previous_latest.json
          fi

      - name: Run tests
        env:
          PREVIOUS_BEST_PATH: /tmp/previous_latest.json
        run: pytest -v